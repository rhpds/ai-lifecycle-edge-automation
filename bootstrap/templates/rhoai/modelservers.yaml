---
# Secret for KServe S3 (same credentials as vehicle-models; KServe requires annotations on the secret)
apiVersion: v1
kind: Secret
type: Opaque
metadata:
  name: s3-kserve-vehicle-models
  namespace: ai-edge-project
  annotations:
    serving.kserve.io/s3-endpoint: minio-microshift-vm.microshift-001.svc.cluster.local:30000
    serving.kserve.io/s3-usehttps: "0"
    serving.kserve.io/s3-region: us-east-1
    serving.kserve.io/s3-useanoncredential: "false"
    argocd.argoproj.io/sync-wave: "6"
stringData:
  AWS_ACCESS_KEY_ID: minio
  AWS_SECRET_ACCESS_KEY: minio123
---
# ServiceAccount for KServe to pull models from S3 (vehicle-models / MinIO)
# Referenced by both Stress Detection and Time to Failure InferenceServices
apiVersion: v1
kind: ServiceAccount
metadata:
  name: sa-vehicle-models
  namespace: ai-edge-project
  annotations:
    argocd.argoproj.io/sync-wave: "6"
  labels:
    opendatahub.io/dashboard: "true"
secrets:
  - name: s3-kserve-vehicle-models
---
# Stress Detection model server
# OpenVINO Model Server, openvino_ir opset13, 1 replica, Small size, vehicle-models connection, path: stress-detection
apiVersion: serving.kserve.io/v1beta1
kind: InferenceService
metadata:
  name: stress-detection
  namespace: ai-edge-project
  annotations:
    argocd.argoproj.io/sync-wave: "6"
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true,Sync=false
    opendatahub.io/hardware-profile-name: default-profile
    opendatahub.io/connections: vehicle-models
    opendatahub.io/model-type: predictive
    security.opendatahub.io/enable-auth: 'false'
    opendatahub.io/hardware-profile-resource-version: '676888'
    openshift.io/description: 'Stress Detection model server'
    openshift.io/display-name: stress-detection
    serving.kserve.io/deploymentMode: RawDeployment
    argocd.argoproj.io/tracking-id: 'bootstrap:serving.kserve.io/InferenceService:ai-edge-project/stress-detection'
    opendatahub.io/hardware-profile-namespace: redhat-ods-applications
  labels:
    opendatahub.io/dashboard: "true"
spec:
  predictor:
    serviceAccountName: sa-vehicle-models
    minReplicas: 1
    maxReplicas: 1
    containerConcurrency: 0
    model:
      modelFormat:
        name: openvino_ir
        version: opset13
      name: ''
      protocolVersion: v2
      resources:
        limits:
          cpu: '2'
          memory: 4Gi
        requests:
          cpu: '2'
          memory: 4Gi
      runtime: stress-detection
      storage:
        key: vehicle-models
        path: stress-detection
    resources:
      limits:
        cpu: '2'
        memory: 8Gi
      requests:
        cpu: '1'
        memory: 8Gi
---
