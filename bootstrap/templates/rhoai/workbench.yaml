{{- if and .Values.rhoai.enabled .Values.workbench.enabled }}
---
# ServiceAccount for the workbench (oauth-proxy uses it)
apiVersion: v1
kind: ServiceAccount
metadata:
  name: model-training
  namespace: ai-edge-project
  annotations:
    argocd.argoproj.io/sync-wave: "6"
---
# PVC for workbench storage
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: model-training-storage
  namespace: ai-edge-project
  annotations:
    opendatahub.io/dashboard: "true"
    argocd.argoproj.io/sync-wave: "6"
    argocd.argoproj.io/sync-options: Sync=false
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 20Gi
---
# Notebook CRD is installed by the operator when DataScienceCluster (sync-wave 3) is reconciled.
# Workbench must apply after that, hence sync-wave 5.
# SkipDryRunOnMissingResource: do not fail sync if CRD is not installed yet; apply will succeed on next sync once operator has created the CRD.
apiVersion: kubeflow.org/v1
kind: Notebook
metadata:
  name: model-training
  namespace: ai-edge-project
  annotations:
    argocd.argoproj.io/sync-wave: "6"
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
    opendatahub.io/image-display-name: Jupyter | TensorFlow | CUDA | Python 3.12
    opendatahub.io/hardware-profile-resource-version: '676888'
    openshift.io/description: 'Model training workbench'
    openshift.io/display-name: model-training
    notebooks.opendatahub.io/last-image-version-git-commit-selection: 8e73cac
    notebooks.opendatahub.io/last-image-selection: 'tensorflow:2025.2'
    opendatahub.io/hardware-profile-namespace: redhat-ods-applications
    opendatahub.io/username: admin
    opendatahub.io/hardware-profile-name: default-profile
    notebooks.opendatahub.io/inject-auth: 'true'
    opendatahub.io/workbench-image-namespace: ''
  labels:
    app: model-training
    opendatahub.io/dashboard: 'true'
    opendatahub.io/odh-managed: 'true'
spec:
  template:
    spec:
      affinity: {}
      containers:
        - name: model-training
          image: 'image-registry.openshift-image-registry.svc:5000/redhat-ods-applications/tensorflow:2025.2'
          imagePullPolicy: Always
          resources:
            limits:
              cpu: '2'
              memory: 4Gi
            requests:
              cpu: '2'
              memory: 4Gi
          readinessProbe:
            failureThreshold: 3
            httpGet:
              path: /notebook/ai-edge-project/model-training/api
              port: notebook-port
              scheme: HTTP
            initialDelaySeconds: 10
            periodSeconds: 5
            successThreshold: 1
            timeoutSeconds: 1
          livenessProbe:
            failureThreshold: 3
            httpGet:
              path: /notebook/ai-edge-project/model-training/api
              port: notebook-port
              scheme: HTTP
            initialDelaySeconds: 10
            periodSeconds: 5
            successThreshold: 1
            timeoutSeconds: 1
          env:
            - name: NOTEBOOK_ARGS
              value: |-
                --ServerApp.port=8888
                --ServerApp.token=''
                --ServerApp.password=''
                --ServerApp.base_url=/notebook/ai-edge-project/model-training
                --ServerApp.quit_button=False
            - name: JUPYTER_IMAGE
              value: 'image-registry.openshift-image-registry.svc:5000/redhat-ods-applications/tensorflow:2025.2'
            - name: PIP_CERT
              value: /etc/pki/tls/custom-certs/ca-bundle.crt
            - name: REQUESTS_CA_BUNDLE
              value: /etc/pki/tls/custom-certs/ca-bundle.crt
            - name: SSL_CERT_FILE
              value: /etc/pki/tls/custom-certs/ca-bundle.crt
            - name: PIPELINES_SSL_SA_CERTS
              value: /etc/pki/tls/custom-certs/ca-bundle.crt
            - name: KF_PIPELINES_SSL_SA_CERTS
              value: /etc/pki/tls/custom-certs/ca-bundle.crt
            - name: GIT_SSL_CAINFO
              value: /etc/pki/tls/custom-certs/ca-bundle.crt
          ports:
            - containerPort: 8888
              name: notebook-port
              protocol: TCP
          volumeMounts:
            - name: model-training-storage
              mountPath: /opt/app-root/src
            - name: shm
              mountPath: /dev/shm
            - name: trusted-ca
              mountPath: /etc/pki/tls/custom-certs/ca-bundle.crt
              readOnly: true
              subPath: ca-bundle.crt
            - mountPath: /opt/app-root/pipeline-runtimes/
              name: runtime-images
            - mountPath: /opt/app-root/runtimes	
              name: elyra-dsp-details
          workingDir: /opt/app-root/src
        - name: kube-rbac-proxy
          image: 'registry.redhat.io/rhoai/odh-kube-auth-proxy-rhel9@sha256:4bff9c9b812872be081e64102cbacb711adfacd1862b5593e9809a6822720131'
          imagePullPolicy: Always
          resources:
            limits:
              cpu: 100m
              memory: 64Mi
            requests:
              cpu: 100m
              memory: 64Mi
          readinessProbe:
            failureThreshold: 3
            httpGet:
              path: /healthz
              port: 8444
              scheme: HTTPS
            initialDelaySeconds: 5
            periodSeconds: 5
            successThreshold: 1
            timeoutSeconds: 1
          livenessProbe:
            failureThreshold: 3
            httpGet:
              path: /healthz
              port: 8444
              scheme: HTTPS
            initialDelaySeconds: 30
            periodSeconds: 5
            successThreshold: 1
            timeoutSeconds: 1
          ports:
            - containerPort: 8443
              name: kube-rbac-proxy
              protocol: TCP
          volumeMounts:
            - name: kube-rbac-proxy-config
              mountPath: /etc/kube-rbac-proxy
            - name: kube-rbac-proxy-tls-certificates
              mountPath: /etc/tls/private
          args:
            - '--secure-listen-address=0.0.0.0:8443'
            - '--upstream=http://127.0.0.1:8888/'
            - '--logtostderr=true'
            - '--v=10'
            - '--proxy-endpoints-port=8444'
            - '--config-file=/etc/kube-rbac-proxy/config-file.yaml'
            - '--tls-cert-file=/etc/tls/private/tls.crt'
            - '--tls-private-key-file=/etc/tls/private/tls.key'
            - '--auth-header-fields-enabled=true'
            - '--auth-header-user-field-name=X-Auth-Request-User'
            - '--auth-header-groups-field-name=X-Auth-Request-Groups'
      enableServiceLinks: false
      serviceAccountName: model-training
      volumes:
        - name: model-training-storage
          persistentVolumeClaim:
            claimName: model-training-storage
        - name: shm
          emptyDir:
            medium: Memory
        - name: trusted-ca
          configMap:
            name: workbench-trusted-ca-bundle
            optional: true
            items:
              - key: ca-bundle.crt
                path: ca-bundle.crt
        - configMap:
            name: pipeline-runtime-images
            optional: true
          name: runtime-images
        - configMap:
            defaultMode: 420
            name: model-training-kube-rbac-proxy-config
          name: kube-rbac-proxy-config
        - name: kube-rbac-proxy-tls-certificates
          secret:
            defaultMode: 420
            secretName: model-training-kube-rbac-proxy-tls
{{- end }}
